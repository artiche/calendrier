<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hors connexion</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f5ff;
      color: #1f2937;
      padding: 24px;
      text-align: center;
    }
    .box {
      max-width: 420px;
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.2rem;
    }
    p {
      margin: 0;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Vous êtes hors connexion</h1>
    <p>Le calendrier n'est pas accessible pour le moment. Réessayez dès que la connexion revient.</p>
  </div>
</body>
</html>
